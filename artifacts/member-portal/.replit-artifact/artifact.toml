kind = "web"
previewPath = "/"
title = "NHS (Leigh) Member Hour Tracker"
version = "1.0.0"
id = "artifacts/member-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25958

[services.development]
run = "pnpm --filter @workspace/member-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/member-portal", "run", "build" ]
publicDir = "artifacts/member-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25958"
BASE_PATH = "/"
