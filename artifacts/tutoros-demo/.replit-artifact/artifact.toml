kind = "video"
previewPath = "/tutoros-demo/"
title = "TutorOS Product Demo"
version = "1.0.0"
id = "artifacts/tutoros-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tutoros-demo/" ]
localPort = 22511

[services.development]
run = "pnpm --filter @workspace/tutoros-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tutoros-demo", "run", "build" ]
publicDir = "artifacts/tutoros-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22511"
BASE_PATH = "/tutoros-demo/"
